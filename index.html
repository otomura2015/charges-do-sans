<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sans Charges</title>

<link rel="icon" type="image/x-icon" href="icon.ico">

<style>
body{
    background:#000;
    color:white;
    font-family:Arial, sans-serif;
    margin:0;
}

header{
    background:#111;
    text-align:center;
    padding:20px;
    border-bottom:3px solid cyan;
}

header h1{
    color:cyan;
    margin:0;
}

nav{
    background:#222;
    text-align:center;
    padding:10px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
}

h2{
    text-align:center;
    color:cyan;
}

.galeria{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:20px;
}

.charge{
    background:#111;
    border:2px solid #333;
    border-radius:10px;
    overflow:hidden;
    transition:0.2s;
}

.charge:hover{
    transform:scale(1.03);
    border-color:cyan;
}

.charge img{
    width:100%;
    display:block;
}

.piadas{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.piada{
    background:#111;
    margin:15px 0;
    padding:15px;
    border-left:5px solid cyan;
}

button{
    background:black;
    color:white;
    border:2px solid cyan;
    padding:10px 20px;
    cursor:pointer;
    display:block;
    margin:20px auto;
}

#aleatoria{
    text-align:center;
    font-size:20px;
    padding-bottom:30px;
}
</style>
</head>
